# This rule is not used by the project ai-inference-orchestrator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to infra.example.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ai-inference-orchestrator
    app.kubernetes.io/managed-by: kustomize
  name: aideployment-viewer-role
rules:
- apiGroups:
  - infra.example.com
  resources:
  - aideployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infra.example.com
  resources:
  - aideployments/status
  verbs:
  - get
